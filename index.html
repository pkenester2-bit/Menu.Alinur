<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Menu</title>
  <meta name="description" content="Static QR menu for Cloudflare Pages">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <main class="qr-shell" id="qrApp" data-lang="ru">
    <header class="qr-header">
      <div class="qr-brand">
        <div class="qr-brand-main">
          <div class="qr-logo" id="logoBox">QR</div>
          <div>
            <strong class="qr-title" id="restaurantTitle">QR Menu Restaurant</strong>
          </div>
        </div>
        <div class="qr-header-controls">
          <div class="qr-lang-dropdown">
            <button class="qr-chip qr-lang-toggle" id="langToggleBtn" type="button" aria-expanded="false" aria-controls="langMenu">
              <span id="langToggleLabel">RU</span>
              <span class="qr-caret" aria-hidden="true">▾</span>
            </button>
            <div class="qr-lang-menu" id="langMenu">
              <button class="qr-chip qr-lang-option" id="langSwapOption" type="button">KZ</button>
            </div>
          </div>
          <button class="qr-chip qr-theme-toggle" id="themeToggle" type="button" aria-label="Theme toggle">
            <span class="theme-icon theme-icon-moon" aria-hidden="true">☾</span>
            <span class="theme-icon theme-icon-sun" aria-hidden="true">☀</span>
          </button>
        </div>
      </div>
    </header>

    <section class="qr-hero-slider" id="heroSlider" aria-label="Hero Slider">
      <div class="qr-hero-fallback" id="heroFallback" data-i18n="hero_fallback">Добавьте фото слайдера в menu.json</div>
      <div class="qr-hero-dots" id="heroDots"></div>
    </section>

    <section class="qr-dishes-wrap" id="dishesRoot">
      <section id="menuSkeleton" class="qr-grid" aria-hidden="true">
        <div class="qr-skeleton"></div>
        <div class="qr-skeleton"></div>
        <div class="qr-skeleton"></div>
      </section>
      <section id="menuContent"></section>
    </section>

    <section class="qr-menu-strip" id="menuSheet" aria-label="menu strip">
      <div class="qr-menu-strip-scroll" id="categoryBar"></div>
    </section>

    <div class="qr-toast" id="toast"></div>
    <div class="qr-modal" id="dishModal"><div class="qr-modal-panel" id="dishModalPanel"></div></div>
    <div class="qr-modal" id="cartModal"><div class="qr-modal-panel" id="cartModalPanel"></div></div>
    <div class="qr-modal" id="waiterModal"><div class="qr-modal-panel" id="waiterModalPanel"></div></div>
    <div class="qr-modal" id="bookingModal"><div class="qr-modal-panel" id="bookingModalPanel"></div></div>

    <nav class="qr-bottom-nav" id="bottomNav" aria-label="bottom navigation">
      <button class="qr-bottom-item active" type="button" data-nav="home"><span class="qr-bottom-icon" aria-hidden="true"><svg viewBox="0 0 24 24" focusable="false"><path d="M12 3.2 3.5 10v10.3h6.1v-6.2h4.8v6.2h6.1V10L12 3.2Zm6.3 15.3h-1.7v-6.2H7.4v6.2H5.7v-7.6L12 6l6.3 4.9v7.6Z"/></svg></span><span data-i18n="home">Главная</span></button>
      <button class="qr-bottom-item" type="button" data-nav="contacts"><span class="qr-bottom-icon">☎</span><span data-i18n="contacts">Контакты</span></button>
      <button class="qr-bottom-item" type="button" data-nav="menu"><span class="qr-bottom-icon">☰</span><span data-i18n="menu">Меню</span></button>
      <button class="qr-bottom-item" type="button" data-nav="cart"><span class="qr-bottom-icon">🛒</span><span data-i18n="cart">Корзина</span><b class="qr-bottom-badge" id="cartCounter">0</b></button>
    </nav>
  </main>

  <script src="assets/app.js"></script>
</body>
</html>
